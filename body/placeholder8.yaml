musicpages:
  - I Stand Amazed in the Presence

prayer:
  text: >
    Heavenly Father, send your Holy Spirit into our hearts, to direct and rule us according to your will, to comfort us in all our afflictions, to defend us from all error, and to lead us into all truth. May our praise be by his holy direction, true and righteous, through Jesus Christ our Lord,
