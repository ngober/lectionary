musicpages:
  - My Hope Is Built On Nothing Less

prayer:
  text: |
    Almighty God,
    We bless you that you will keep these sinners you have loved, and have engaged that we would not forsake you.
    How sweet is the glorious election based on your Word and worked inwardly within the soul.
    All the good things of life are nothing when compared with your love, and with one glimpse of your favor, and such I could not know except by the Holy Spirit, who proceeds from the Father and the Son, one God, now and for ever

  reference: The Valley of Vision, "Assurance", pg 92-93
